<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Revision cost curve showing the plasticity window closing over time">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Axes -->
<line x1="60" y1="280" x2="620" y2="280" stroke="#5C5849" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="60" y1="280" x2="60" y2="40" stroke="#5C5849" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Axis labels -->
<text x="340" y="308" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Time (years of model success)</text>
<text x="22" y="160" text-anchor="middle" transform="rotate(-90,22,160)" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Cost of revision</text>

<!-- Plasticity window — subtle ink wash -->
<path d="M80 260 C160 255 240 240 300 210 L300 280 L80 280 Z" fill="#1A1710" fill-opacity="0.05"/>

<!-- Revision cost curve — oxblood, the key message -->
<path d="M80 260 C160 255 240 240 300 210 C360 178 400 145 440 110 C480 75 510 58 540 50" fill="none" stroke="#6E2535" stroke-width="1.5"/>

<!-- Curve label — matches the oxblood curve -->
<text x="552" y="55" text-anchor="start" font-family="'DM Sans', sans-serif" font-size="11" fill="#6E2535">Revision</text>
<text x="552" y="69" text-anchor="start" font-family="'DM Sans', sans-serif" font-size="11" fill="#6E2535">cost</text>

<!-- Plasticity window label -->
<text x="185" y="256" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Plasticity window</text>
<text x="185" y="270" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">(revision still survivable)</text>

<!-- Window closes — rule gray dashed -->
<line x1="300" y1="50" x2="300" y2="280" stroke="#C6C1B2" stroke-width="1" stroke-dasharray="4 3"/>
<text x="300" y="44" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Window closes</text>
<line x1="300" y1="276" x2="300" y2="284" stroke="#5C5849" stroke-width="1"/>

<!-- Crisis visible — warm stone dashed -->
<line x1="480" y1="50" x2="480" y2="280" stroke="#5C5849" stroke-width="1" stroke-dasharray="4 3"/>
<text x="480" y="44" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Crisis visible</text>
<line x1="480" y1="276" x2="480" y2="284" stroke="#5C5849" stroke-width="1"/>

<!-- Double arrow: too late span -->
<line x1="305" y1="158" x2="473" y2="158" stroke="#C6C1B2" stroke-width="1" marker-end="url(#arr)" marker-start="url(#arr)"/>
<text x="390" y="150" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Too late</text>

<!-- Layer annotations — recede into rule gray -->
<text x="158" y="98" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#C6C1B2">Processes</text>
<text x="228" y="80" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#C6C1B2">Identity</text>
<text x="308" y="66" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#C6C1B2">Strategy</text>
<text x="388" y="56" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#C6C1B2">Culture</text>
</svg>
