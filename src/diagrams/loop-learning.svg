<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Single-loop and double-loop learning diagram">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Column labels -->
<text x="130" y="32" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#5C5849" letter-spacing="0.13em">GOVERNING MODEL</text>
<text x="310" y="32" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#5C5849" letter-spacing="0.13em">STRATEGY</text>
<text x="490" y="32" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#5C5849" letter-spacing="0.13em">ACTIONS</text>
<text x="610" y="32" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" font-weight="500" fill="#5C5849" letter-spacing="0.13em">RESULTS</text>

<!-- Governing model box — ink border, the structural anchor -->
<rect x="50" y="48" width="160" height="56" rx="3" fill="none" stroke="#1A1710" stroke-width="1"/>
<text x="130" y="72" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#1A1710">Governing model</text>
<text x="130" y="90" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Assumptions about the world</text>

<!-- Strategy box -->
<rect x="230" y="48" width="160" height="56" rx="3" fill="none" stroke="#C6C1B2" stroke-width="1"/>
<text x="310" y="72" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#1A1710">Strategy</text>
<text x="310" y="90" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Goals and plans</text>

<!-- Actions box -->
<rect x="410" y="48" width="160" height="56" rx="3" fill="none" stroke="#C6C1B2" stroke-width="1"/>
<text x="490" y="72" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#1A1710">Actions</text>
<text x="490" y="90" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">What the firm does</text>

<!-- Results box -->
<rect x="570" y="48" width="80" height="56" rx="3" fill="none" stroke="#C6C1B2" stroke-width="1"/>
<text x="610" y="76" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#1A1710">Results</text>

<!-- Forward arrows -->
<line x1="212" y1="76" x2="228" y2="76" stroke="#C6C1B2" stroke-width="1" marker-end="url(#arr)"/>
<line x1="392" y1="76" x2="408" y2="76" stroke="#C6C1B2" stroke-width="1" marker-end="url(#arr)"/>
<line x1="562" y1="76" x2="568" y2="76" stroke="#C6C1B2" stroke-width="1" marker-end="url(#arr)"/>

<!-- Single-loop: Results back to Strategy — warm stone -->
<path d="M610 104 L610 192 L310 192 L310 106" fill="none" stroke="#5C5849" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="40" y="197" text-anchor="end" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Loop I</text>
<text x="462" y="210" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Single-loop — adjusts tactics, goals stay intact</text>

<!-- Double-loop: Results back to Governing model — oxblood, the key concept -->
<path d="M610 108 L610 302 L130 302 L130 106" fill="none" stroke="#6E2535" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="40" y="308" text-anchor="end" font-family="'DM Sans', sans-serif" font-size="11" fill="#6E2535">Loop II</text>
<text x="370" y="320" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#6E2535">Double-loop — questions the governing model itself</text>

<!-- Bottom divider and labels -->
<line x1="40" y1="358" x2="640" y2="358" stroke="#C6C1B2" stroke-width="0.5"/>
<line x1="340" y1="362" x2="340" y2="410" stroke="#C6C1B2" stroke-width="0.5"/>
<text x="130" y="386" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Questions assumptions</text>
<text x="490" y="386" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Corrects execution</text>
</svg>
