<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Signal filtering diagram showing how mental models block challenging information">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Gap annotation: vertical dashes up from each box, horizontal double-arrow -->
<line x1="95" y1="110" x2="95" y2="74" stroke="#C6C1B2" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="590" y1="97" x2="590" y2="74" stroke="#C6C1B2" stroke-width="1" stroke-dasharray="3 2"/>
<line x1="97" y1="74" x2="588" y2="74" stroke="#C6C1B2" stroke-width="1" marker-end="url(#arr)" marker-start="url(#arr)"/>
<text x="342" y="63" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Signal leads decision by months — but arrives filtered</text>

<!-- Front line box — rule gray border -->
<rect x="30" y="120" width="130" height="80" rx="3" fill="none" stroke="#C6C1B2" stroke-width="1"/>
<text x="95" y="150" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#1A1710">Front line</text>
<text x="95" y="168" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Customer signal</text>
<text x="95" y="184" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">accumulates here</text>

<!-- Arrow: signal travels to filter -->
<line x1="162" y1="160" x2="218" y2="160" stroke="#5C5849" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Mental model filter box — oxblood, the central problem -->
<rect x="220" y="100" width="160" height="120" rx="3" fill="none" stroke="#6E2535" stroke-width="1.5"/>
<text x="300" y="148" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#1A1710">Mental model</text>
<text x="300" y="166" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Filters before</text>
<text x="300" y="182" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">evaluation begins</text>

<!-- Confirms model arrow — passes through upward -->
<line x1="382" y1="138" x2="528" y2="116" stroke="#5C5849" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="458" y="112" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Confirms model</text>

<!-- Challenges model arrow — dashed, blocked -->
<line x1="382" y1="182" x2="446" y2="202" stroke="#1A1710" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="464" y="198" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="14" fill="#1A1710">×</text>
<text x="510" y="216" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">Challenges model</text>
<text x="510" y="230" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">(attenuated)</text>

<!-- Decision center box — ink border -->
<rect x="530" y="97" width="120" height="56" rx="3" fill="none" stroke="#1A1710" stroke-width="1"/>
<text x="590" y="121" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#1A1710">Decision</text>
<text x="590" y="139" text-anchor="middle" dominant-baseline="central" font-family="'DM Sans', sans-serif" font-size="11" fill="#5C5849">center</text>

<!-- Problem statement -->
<text x="300" y="254" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="12" fill="#5C5849" font-style="italic">Not a communication problem.</text>
<text x="300" y="270" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="12" fill="#5C5849" font-style="italic">A reception problem.</text>
</svg>
